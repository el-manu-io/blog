<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:url" content="http://blog.zahlenpresse.de">
    <meta property="og:title" content="Null Bit Presse">
    <meta property="og:description" content="Verlustfreie Verarbeitung von Bits und Logik.">
    <title>Null Bit Presse</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" type="text/css" href="/static/css/style.css">
    <link rel="stylesheet" type="text/css" href="/static/css/masonry.css">
  </head>

  <body>
    <aside><nav></nav></aside>

    <main>
      <header>
        <h1>Amsterdam 2019</h1>
      </header>

      <article>
        <div id="masonry"></div>
      </article>

      <footer>
        <p>&copy; 2025 Blog, CC0 1.0 Universal.</p>
      </footer>
    </main>

    <aside><nav></nav></aside>

    <template id="dialog">
      <dialog>
        <div class="content"><img></div>
      </dialog>
    </template>

    <template id="img">
      <img loading="lazy">
    </template>

    <script type="module">
      import gallery from "/static/amsterdam-2019/gallery.js";
      import { loadImage, onClick } from "/static/js/masonry.js";
      const tmpArticle = document.getElementById('masonry');
      const tmpImage = document.getElementById('img');
      const tmpDialog = document.getElementById('dialog');

      onClick(tmpArticle, tmpDialog);

      gallery.topics.forEach((topic) => {
        topic.images.forEach((path) => {
          loadImage(path, '/static/amsterdam-2019/', tmpImage, (template) => {
            const clone = template.content.cloneNode(true);
            tmpArticle.append(clone);
          });
        });
      });
    </script>
  </body>
</html>
