<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <form id="abc" name="abc"></form>
    <input form="abc" type="radio" name="abc" value="a">
    <input form="abc" type="radio" name="abc" value="b" checked>
    <input form="abc" type="radio" name="abc" value="c">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
      const form = document.forms['abc'];
      Array.from(form.elements).forEach((element) => {
        const name = element.name;
        console.log('element.name', element.name);
        if (name) {
          const radio = form.elements.namedItem(name);
          console.log('radio', radio.name, radio.value);
        }
      });
    </script>
  </body>
</html>
